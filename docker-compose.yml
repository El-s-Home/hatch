services:
  hatch-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hatch-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - hatch-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  hatch-network:
    driver: bridge
