services:
  hatch-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hatch-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - hatch-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  hatch-network:
    driver: bridge
